name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint with ruff
        run: ruff check inverter_bridge tests
      - name: Type check with mypy
        run: mypy inverter_bridge
        continue-on-error: true   # mypy strict mode warnings shouldn't block; tighten later
      - name: Run tests with coverage
        run: pytest --cov=inverter_bridge --cov-report=term-missing --cov-fail-under=70
