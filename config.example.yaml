# inverter-bridge config example
# Copy to /etc/inverter-bridge.yaml on the target SBC and edit.
#
# To find the correct by-path symlinks for your USB ports, run:
#   ls -la /dev/serial/by-path/
# Map each inverter to its physical USB port. The by-path mapping is stable
# across reboots as long as you don't move cables between ports.

inverters:
  - name: inv1
    port: /dev/serial/by-path/platform-<example-usb-id>-usb-0:1:1.0-port0
    slave: 0x01
  - name: inv2
    port: /dev/serial/by-path/platform-<example-usb-id>-usb-0:1:1.0-port0
    slave: 0x02

polling:
  hot_interval_s: 3.0
  cold_interval_s: 60.0
  serial_timeout_s: 1.5
  inter_query_delay_s: 0.05
  # If a bus is noisier (e.g. cable picks up EMI from nearby AC wiring),
  # increase retry_attempts; each retry adds serial_timeout_s to the worst
  # case for that block.
  retry_attempts: 3
  retry_backoff_s: 0.1

mqtt:
  host: 192.0.2.10           # your MQTT broker (e.g. Mosquitto on HA host)
  port: 1883
  username: inverter_bridge
  password_file: /etc/inverter-bridge.secrets
  client_id: inverter_bridge
  # topic_prefix: MQTT topic root for the inverter data. Renamed from
  # `solar_assistant` to `gadi_inverters` on 2026-06-03 (the real Solar Assistant
  # RPi is long gone). HA entity_ids are unaffected: discovery unique_ids
  # (`total_<key>`, `inverter_<N>_<key>`) are independent of this prefix, so HA
  # re-binds the existing renamed entities by unique_id. The daemon publishes:
  #   gadi_inverters/total/<key>/state            (aggregates)
  #   gadi_inverters/inverter_<N>/<key>/state     (per-inverter)
  #   gadi_inverters/_meta/<diagnostic>/state     (poll_duration_ms etc.)
  #   gadi_inverters/availability                 (online/offline retained)
  topic_prefix: gadi_inverters
  discovery_prefix: homeassistant
  retain_discovery: true
  qos: 0

logging:
  level: INFO
  format: text   # or "json"
