# inverter-bridge production config — GADI 2026-05-20
inverters:
  - name: inv1
    port: /dev/serial/by-path/platform-5311400.usb-usb-0:1:1.0-port0
    slave: 0x01
  - name: inv2
    port: /dev/serial/by-path/platform-xhci-hcd.1.auto-usb-0:1:1.0-port0
    slave: 0x02
polling:
  hot_interval_s: 3.0
  cold_interval_s: 60.0
  serial_timeout_s: 1.5
  inter_query_delay_s: 0.05
  retry_attempts: 3
  retry_backoff_s: 0.1
mqtt:
  host: 172.16.10.12
  port: 1883
  username: mqtt
  password_file: /etc/inverter-bridge.secrets
  client_id: gadi_inverter_bridge
  topic_prefix: solar_assistant
  discovery_prefix: homeassistant
  retain_discovery: true
  qos: 0
logging:
  level: DEBUG
  format: text
